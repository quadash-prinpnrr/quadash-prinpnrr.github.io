<svg width="400" height="266" viewBox="0 0 400 266" xmlns="http://www.w3.org/2000/svg">
  <!-- Sfondo trasparente -->
  <rect width="400" height="266" fill="none"/>
  
  <g transform="translate(0, 40)">
    <!-- Icona (Q + Distribuzioni) centrata orizzontalmente -->
    <g transform="translate(150, 0)">
      <!-- Cerchio esterno della Q -->
      <path d="M 80 20 A 40 40 0 1 0 70 95 L 95 110" fill="none" stroke="#3a4145" stroke-width="6" stroke-linecap="round"/>
      
      <!-- Distribuzione 1 (Training - Tratteggiata) -->
      <path d="M 20 75 Q 35 75 45 35 Q 55 75 70 75" fill="none" stroke="#3a4145" stroke-width="3" stroke-dasharray="4 2" opacity="0.6"/>
      
      <!-- Distribuzione 2 (Shifted - Piena) -->
      <path d="M 40 75 Q 55 75 65 35 Q 75 75 90 75" fill="none" stroke="#b80135" stroke-width="4" stroke-linecap="round"/>
      
      <!-- Freccia di Shift -->
      <path d="M 45 45 L 60 45 L 56 41 M 60 45 L 56 49" fill="none" stroke="#b80135" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Testo QuaDaSh centrato -->
    <text x="200" y="150" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="#3a4145" text-anchor="middle">
      Qua<tspan fill="#b80135">DaSh</tspan>
    </text>
    
    <!-- Sottotitolo centrato -->
    <text x="200" y="175" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#50585d" text-anchor="middle">
      Quantification in the Context of Dataset Shift
    </text>
  </g>
</svg>